<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Financial Tracker</title>
  <style>
    :root{color-scheme:dark;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#0f171a;color:#f0eadf}*{box-sizing:border-box}body{margin:0}button,input,select{font:inherit}button,.button{border:1px solid #2c393e;background:#1b262a;color:#f0eadf;border-radius:12px;padding:10px 12px;cursor:pointer;display:inline-flex;gap:8px;align-items:center}button:hover,.button:hover{border-color:#e1a84b}.app{min-height:100vh;display:grid;grid-template-columns:280px 1fr;gap:28px;padding:28px}.sidebar,.panel{background:#172226;border:1px solid #2c393e;border-radius:22px;padding:22px}.sidebar{align-self:start;position:sticky;top:28px}.brand{font-weight:900;font-size:20px;margin-bottom:12px;color:#e1a84b}.muted{color:#96a0a3;line-height:1.55}h3{margin:28px 0 12px;font-size:12px;text-transform:uppercase;letter-spacing:.12em;color:#687579}.account{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;padding:12px;background:#202c31;border:1px solid #2c393e;border-radius:14px;margin-bottom:8px}.mono,.account strong,td:last-child,h1{font-family:"IBM Plex Mono",ui-monospace,monospace}.stack{padding:10px 12px;border:1px dashed #334348;border-radius:12px;color:#c5ccc8;margin-bottom:8px}.hero{display:flex;justify-content:space-between;gap:20px;align-items:flex-start;margin-bottom:20px}.eyebrow{color:#5fc3b8;text-transform:uppercase;letter-spacing:.14em;font-size:12px;font-weight:700;margin:0 0 8px}h1{font-size:clamp(42px,6vw,72px);margin:0;letter-spacing:-.06em}.actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}.cards{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px;margin-bottom:16px}.insight{display:block;text-align:left;padding:18px;min-height:168px}.insight span{display:block;font-weight:800;margin-bottom:12px}.insight strong{display:block;font-size:22px;margin-bottom:12px}.insight p{margin:0;color:#a7b0b2;line-height:1.5}.insight.active.teal{background:#163431;border-color:#5fc3b8}.insight.active.coral{background:#351c1c;border-color:#d9635a}.insight.active.gold{background:#342815;border-color:#e1a84b}.grid{display:grid;grid-template-columns:minmax(0,1.45fr) minmax(320px,.55fr);gap:16px;margin-bottom:16px}.panel-title{color:#aeb6b8;text-transform:uppercase;letter-spacing:.12em;font-size:12px;font-weight:800;margin-bottom:12px}svg{width:100%;height:520px;display:block;background:radial-gradient(circle at 55% 45%,#1f2e32,#141e21 62%);border-radius:16px}line{stroke:#2c393e;stroke-width:1.2;opacity:.75}line.similar{stroke:#2f6761;stroke-dasharray:5 5}line.active{stroke:#e1a84b;stroke-width:2.4;opacity:1}.node circle{fill:#202c31;stroke:#677579;stroke-width:1.2}.node.active circle{stroke:#e1a84b;stroke-width:3}.node text{fill:#cbd2d1;text-anchor:middle;font-size:12px}.tx-form{display:grid;gap:10px}.tx-form input,.tx-form select{width:100%;padding:12px;border-radius:12px;border:1px solid #2c393e;background:#10191c;color:#f0eadf}.tx-form button{justify-content:center;background:#e1a84b;color:#17120a;font-weight:800}.note{margin-top:14px;padding:12px;border-radius:14px;background:#202c31;color:#aeb6b8;line-height:1.45}.ledger{overflow:auto}table{width:100%;border-collapse:collapse;font-size:14px}td{padding:12px 10px;border-top:1px solid #2c393e;color:#dce2df}td:first-child{color:#7d898d;width:110px}td:last-child{text-align:right}td span{background:#202c31;color:#aeb6b8;padding:4px 8px;border-radius:999px;font-size:12px}@media(max-width:1000px){.app{grid-template-columns:1fr}.sidebar{position:static}.cards,.grid{grid-template-columns:1fr}.hero{flex-direction:column}.actions{justify-content:flex-start}}
  </style>
</head>
<body>
  <div id="app"></div>
<script>
const accounts=[{id:"acct_checking",name:"Checking",type:"checking",balance:4218.42},{id:"acct_credit",name:"Credit Card",type:"credit",balance:-1362.17},{id:"acct_savings",name:"Savings",type:"savings",balance:12500}];
const seed=[['2026-07-05','Netflix','Streaming',15.49,'acct_credit'],['2026-06-05','Netflix','Streaming',15.49,'acct_credit'],['2026-05-05','Netflix','Streaming',15.49,'acct_credit'],['2026-07-02','Spotify','Streaming',11.99,'acct_credit'],['2026-06-02','Spotify','Streaming',11.99,'acct_credit'],['2026-05-02','Spotify','Streaming',11.99,'acct_credit'],['2026-06-29','Hulu','Streaming',12.99,'acct_credit'],['2026-05-29','Hulu','Streaming',12.99,'acct_credit'],['2026-04-29','Hulu','Streaming',12.99,'acct_credit'],['2026-07-04','Disney+','Streaming',13.99,'acct_credit'],['2026-06-04','Disney+','Streaming',13.99,'acct_credit'],['2026-05-04','Disney+','Streaming',13.99,'acct_credit'],['2026-07-10','HBO Max','Streaming',9.99,'acct_credit'],['2026-06-10','HBO Max','Streaming',9.99,'acct_credit'],['2026-05-10','HBO Max','Streaming',9.99,'acct_credit'],['2026-07-04','Whole Foods','Groceries',86.4,'acct_checking'],['2026-06-28',"Trader Joe's",'Groceries',54.1,'acct_checking'],['2026-06-30','Starbucks','Coffee',6.75,'acct_checking'],['2026-07-03','Shell','Gas',42,'acct_credit'],['2026-07-01','Amazon','Shopping',128.3,'acct_credit'],['2026-06-20','Target','Shopping',64.2,'acct_credit'],['2026-06-26','Delta','Travel',340,'acct_credit'],['2026-07-05','Unfamiliar overseas merchant','Uncategorized',1240,'acct_credit']].map((r,i)=>({id:'tx_'+i,date:r[0],merchant:r[1],category:r[2],amount:r[3],accountId:r[4]}));
let tx=JSON.parse(localStorage.getItem('aft_static_tx')||'null')||seed;let selected='recurring';
const $=id=>document.getElementById(id);const money=n=>(n<0?'-':'')+'$'+Math.abs(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
function merchantStats(){const m={};tx.forEach(t=>(m[t.merchant]??=[]).push(t));return Object.entries(m).map(([merchant,rows])=>{const sorted=rows.slice().sort((a,b)=>new Date(a.date)-new Date(b.date));const intervals=sorted.slice(1).map((t,i)=>Math.round((new Date(t.date)-new Date(sorted[i].date))/86400000));const avgAmount=rows.reduce((s,t)=>s+t.amount,0)/rows.length;const avgInterval=intervals.reduce((s,x)=>s+x,0)/(intervals.length||1);const std=Math.sqrt(intervals.reduce((s,x)=>s+(x-avgInterval)**2,0)/(intervals.length||1));return{merchant,rows,category:rows[0].category,avgAmount,avgInterval,std,count:rows.length}})}
function insights(){const stats=merchantStats();const rec=stats.filter(s=>s.count>=3&&s.avgInterval>=25&&s.avgInterval<=35&&s.std<=4);const amounts=tx.map(t=>t.amount);const mean=amounts.reduce((a,b)=>a+b,0)/amounts.length;const sd=Math.sqrt(amounts.reduce((s,x)=>s+(x-mean)**2,0)/amounts.length)||1;const an=tx.map(t=>({...t,z:(t.amount-mean)/sd})).filter(t=>t.z>2||(t.amount>mean*4&&t.amount>250)).sort((a,b)=>b.amount-a.amount)[0];const cats={};tx.forEach(t=>cats[t.category]=(cats[t.category]||0)+t.amount);const top=Object.entries(cats).sort((a,b)=>b[1]-a[1])[0]||['None',0];const cuts=rec.slice().sort((a,b)=>a.avgAmount-b.avgAmount).slice(0,2);return[{id:'recurring',tone:'teal',title:'Recurring subscriptions detected',stat:money(rec.reduce((s,r)=>s+r.avgAmount,0))+'/mo',body:rec.length?rec.map(r=>r.merchant).join(', ')+' bill on a near-monthly cadence.':'No strong monthly recurrence pattern was found yet.',merchants:rec.map(r=>r.merchant)},{id:'anomaly',tone:'coral',title:an?'Anomaly flagged':'No anomaly flagged',stat:an?money(an.amount):'Clear',body:an?an.merchant+' is unusually large compared with your normal transaction pattern. Z-score: '+an.z.toFixed(2)+'.':'No transaction currently crosses the anomaly threshold.',merchants:an?[an.merchant]:[]},{id:'savings',tone:'gold',title:'Savings opportunity',stat:money(cuts.reduce((s,c)=>s+c.avgAmount,0))+'/mo',body:cuts.length?'Review '+cuts.map(c=>c.merchant).join(' and ')+'. Highest spend category: '+top[0]+' at '+money(top[1])+'.':'Highest spend category: '+top[0]+' at '+money(top[1])+'.',merchants:cuts.map(c=>c.merchant)}]}
function graph(){const merchants=[...new Map(tx.map(t=>[t.merchant,t])).values()];const nodes=[{id:'hub',label:'All accounts',x:90,y:250,r:28}];merchants.forEach((m,i)=>{const angle=2*Math.PI*i/merchants.length,rad=170+(i%3)*36;nodes.push({id:m.merchant,label:m.merchant,x:Math.round(410+Math.cos(angle)*rad),y:Math.round(250+Math.sin(angle)*rad),r:m.amount>500?22:16,category:m.category})});const edges=merchants.map(m=>({from:'hub',to:m.merchant,kind:'transaction'}));for(let i=0;i<merchants.length;i++)for(let j=i+1;j<merchants.length;j++)if(merchants[i].category===merchants[j].category&&merchants[i].category!=='Uncategorized')edges.push({from:merchants[i].merchant,to:merchants[j].merchant,kind:'similar'});return{nodes,edges}}
function split(line){const out=[];let cur='',q=false;for(const ch of line){if(ch==='"')q=!q;else if(ch===','&&!q){out.push(cur);cur=''}else cur+=ch}out.push(cur);return out}
function importCsv(file){file.text().then(text=>{const lines=text.trim().split(/\r?\n/).filter(Boolean);if(!lines.length)return;const h=split(lines[0]).map(x=>x.trim().toLowerCase());const rows=lines.slice(1).map((line,i)=>{const v=split(line),r=Object.fromEntries(h.map((k,j)=>[k,v[j]||'']));return{id:r.id||'csv_'+Date.now()+'_'+i,date:r.date,merchant:r.merchant||r.description||'Unknown merchant',category:r.category||'Uncategorized',amount:Number(r.amount||0),accountId:r.accountid||r.account_id||r.account||'acct_credit'}}).filter(r=>r.date&&Number.isFinite(r.amount));tx=[...rows,...tx];save()})}
function save(){localStorage.setItem('aft_static_tx',JSON.stringify(tx));render()}
function render(){const ins=insights(),sel=ins.find(i=>i.id===selected)||ins[0],g=graph(),hi=new Set(['hub',...sel.merchants]);document.body.querySelector('#app').innerHTML=`<main class="app"><aside class="sidebar"><div class="brand">AI Financial Tracker</div><p class="muted">Graph-powered dashboard with AI-style insights, anomaly detection, CSV import, and local persistence.</p><h3>Accounts</h3>${accounts.map(a=>`<div class="account"><span>${a.name}</span><strong>${money(a.balance)}</strong></div>`).join('')}<h3>Integrations included</h3><div class="stack">Neo4j Cypher graph model</div><div class="stack">RocketRide insight pipeline</div><div class="stack">Butterbase-ready agent config</div></aside><section><header class="hero"><div><p class="eyebrow">Functional demo · local-first</p><h1>${money(accounts.reduce((s,a)=>s+a.balance,0))}</h1><p class="muted">Current tracked spend: ${money(tx.reduce((s,t)=>s+t.amount,0))} across ${tx.length} transactions.</p></div><div class="actions"><label class="button">Import CSV<input id="csv" type="file" accept=".csv" hidden></label><button id="export">Export CSV</button><button id="reset">Reset</button></div></header><section class="cards">${ins.map(i=>`<button class="insight ${i.tone} ${i.id===selected?'active':''}" data-insight="${i.id}"><span>${i.title}</span><strong>${i.stat}</strong><p>${i.body}</p></button>`).join('')}</section><section class="grid"><div class="panel"><div class="panel-title">Transaction graph</div><svg viewBox="0 0 820 520">${g.edges.map((e,i)=>{const a=g.nodes.find(n=>n.id===e.from),b=g.nodes.find(n=>n.id===e.to),active=hi.has(e.from)&&hi.has(e.to);return`<line x1="${a.x}" y1="${a.y}" x2="${b.x}" y2="${b.y}" class="${e.kind} ${active?'active':''}"></line>`}).join('')}${g.nodes.map(n=>`<g class="node ${hi.has(n.id)?'active':''}"><circle cx="${n.x}" cy="${n.y}" r="${n.r}"></circle><text x="${n.x}" y="${n.y+n.r+15}">${n.label.length>18?n.label.slice(0,17)+'…':n.label}</text></g>`).join('')}</svg></div><div class="panel"><div class="panel-title">Add transaction</div><form id="form" class="tx-form"><input name="date" type="date" value="2026-07-07"><input name="merchant" placeholder="Merchant"><select name="category">${['Streaming','Groceries','Gas','Coffee','Shopping','Travel','Uncategorized'].map(c=>`<option>${c}</option>`).join('')}</select><input name="amount" type="number" step="0.01" placeholder="Amount"><select name="accountId">${accounts.map(a=>`<option value="${a.id}">${a.name}</option>`).join('')}</select><button>Add transaction</button></form><div class="note">The AI logic in this demo is deterministic and explainable. Optional RocketRide/LLM integration is included under integrations/rocketride.</div></div></section><section class="panel ledger"><div class="panel-title">Recent transactions</div><table><tbody>${tx.slice().sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,12).map(t=>`<tr><td>${t.date}</td><td>${t.merchant}</td><td><span>${t.category}</span></td><td>${accounts.find(a=>a.id===t.accountId)?.name||t.accountId}</td><td>${money(t.amount)}</td></tr>`).join('')}</tbody></table></section></section></main>`;document.querySelectorAll('[data-insight]').forEach(b=>b.onclick=()=>{selected=b.dataset.insight;render()});$('reset').onclick=()=>{tx=seed;localStorage.removeItem('aft_static_tx');render()};$('csv').onchange=e=>e.target.files[0]&&importCsv(e.target.files[0]);$('export').onclick=()=>{const header='id,date,merchant,category,amount,accountId';const rows=tx.map(t=>[t.id,t.date,t.merchant,t.category,t.amount,t.accountId].map(v=>'"'+String(v).replaceAll('"','""')+'"').join(','));const blob=new Blob([[header,...rows].join('\n')],{type:'text/csv'}),url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download='transactions.csv';a.click();URL.revokeObjectURL(url)};$('form').onsubmit=e=>{e.preventDefault();const f=new FormData(e.target);if(!f.get('merchant')||!f.get('amount'))return;tx=[{id:'tx_'+Date.now(),date:f.get('date'),merchant:f.get('merchant'),category:f.get('category'),amount:Number(f.get('amount')),accountId:f.get('accountId')},...tx];save()}}
render();
</script>
</body>
</html>
